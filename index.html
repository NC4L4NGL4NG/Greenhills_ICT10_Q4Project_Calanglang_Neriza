<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Sapphire Journey</title>
    
           <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
 <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
<style>
        body {
            background: url('https://i.pinimg.com/originals/0c/e5/ef/0ce5ef27f70a4e5d9079aac5ba7bae15.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 182, 193, 0.9); 
            backdrop-filter: blur(10px);
            border-bottom: 3px solid #ff80ab;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #b33951;
            text-shadow: 1px 1px white;
        }

        nav a {
            color: #d81b60;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: white; }

        .content {
            flex: 1;
            max-width: 1100px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 4px solid #ffb6c1;
        }

        .main-title {
            text-align: center;
            font-size: 2.8rem;
            color: #b33951;
            margin-bottom: 30px;
            text-shadow: 2px 2px white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #f8bbd0;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        .gallery-card:hover {
            transform: translateY(-10px);
            border-color: #ff80ab;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background-color: #fff0f5;
            border-bottom: 2px solid #f8bbd0;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-details {
            padding: 15px;
            text-align: center;
        }

        .card-title {
            font-size: 1.1rem;
            color: #d81b60;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: #6d4c41;
        }

        .footer {
            background: rgba(255, 182, 193, 0.9);
            color: #b33951;
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            border-top: 3px solid #ff80ab;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="brand">10-Sapphire</div>
            <nav>
                <a href="list.html">Home</a>
                <a href="skills.html">Attendance Tracker</a>
                <a href="index.html">Gallery</a>
            </nav>
        </div>
    </header>

    <main class="content">
        <h1 class="main-title">Gallery Highlights </h1>
        <div id="gallery-container" class="gallery-grid"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2025-2026 10-Sapphire</p>
    </footer>

    <script type="py" src="main.py"></script>

</body>
</html>
