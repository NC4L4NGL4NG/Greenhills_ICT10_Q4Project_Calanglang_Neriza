<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 Classmates System</title>
    
 <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
 <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        body { 
            background: url('https://i.pinimg.com/originals/0c/e5/ef/0ce5ef27f70a4e5d9079aac5ba7bae15.gif') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: row;
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            margin: 0;
            gap: 40px; 
            padding-top: 50px;
        }

        .container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px);
            padding: 25px; 
            border-radius: 30px; 
            border: 3px solid #ffb6c1; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2, h3 { color: #b33951; font-weight: bold; margin-bottom: 15px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            border-radius: 15px; 
            border: 2px solid #f8bbd0; 
            outline: none;
            transition: 0.3s;
            box-sizing: border-box; /* Prevents input from overflowing */
        }

        input:focus { border-color: #d81b60; background-color: #fff0f5; }

        .btn-add { 
            width: 100%; 
            background: linear-gradient(45deg, #ff80ab, #d81b60); 
            color: white; 
            border: none; 
            padding: 14px; 
            margin-top: 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            transition: transform 0.2s;
        }

        .btn-show { 
            width: 100%; 
            background: linear-gradient(45deg, #9575cd, #673ab7); 
            color: white; 
            border: none; 
            padding: 14px; 
            margin-top: 10px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3);
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.03); }

        .list-container { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            border: 5px solid #ffb6c1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 400px;
            min-height: 200px;
        }

        .entry-item {
            background: #fff5f7;
            margin: 10px 0;
            padding: 10px;
            border-left: 5px solid #ff80ab;
            border-radius: 10px;
            text-align: left;
            color: #6d4c41;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Grade 10 System</h2>
        <p style="color: #b33951; font-size: 0.8rem;">Add your classmates below!</p>
        
        <input type="text" id="nameInput" placeholder="Name">
        <input type="text" id="sectionInput" placeholder="Section">
        <input type="text" id="subjectInput" placeholder="Favorite Subject">
        
        <button id="addBtn" class="btn-add" py-click="add_classmate">Add Classmate 🎀</button>
        <button id="showBtn" class="btn-show" py-click="show_list">Show List </button>
    </div>
    <header class="navbar">
        <div class="nav-container">
            <div class="brand">10-Sapphire</div>
            <nav>
                <a href="list.html">Home</a>
                <a href="skills.html">Attendance Tracker</a>
                <a href="index.html">Gallery</a>
            </nav>
        </div>
    </header>


    <div class="list-container" id="listOutput">
        <h3>📋 Classmate List</h3>
        <p style="color: #999;">No one here yet...</p>
    </div>

    <script type="py" src="main.list.py"></script>
</body>
</html>
